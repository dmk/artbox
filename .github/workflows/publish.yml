name: Publish

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "artbox") | .version')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

      - name: Verify CHANGELOG has entry for this version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if ! grep -q "^## \[$TAG_VERSION\]" CHANGELOG.md; then
            echo "Error: CHANGELOG.md has no entry for version $TAG_VERSION"
            echo "Add a section like: ## [$TAG_VERSION] - $(date +%Y-%m-%d)"
            exit 1
          fi

      - name: Publish artbox
        run: cargo publish -p artbox
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          NOTES=$(awk "/^## \[$TAG_VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          gh release create "v$TAG_VERSION" \
            --title "v$TAG_VERSION" \
            --notes "$(cat <<EOF
          $NOTES

          ---

          [crates.io](https://crates.io/crates/artbox/$TAG_VERSION)
          EOF
          )"
